<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>JIFF MoneyBTI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="start-screen" class="screen active">
        <p class="badge">전주국제영화제 스페셜</p>
        <h1>나의 영화제 소비 성향,<br />MoneyBTI로 확인하기</h1>
        <p class="subtitle">10개 질문으로 알아보는 나의 영화제 관람/소비 스타일</p>

        <div class="start-visual">
          <img class="start-team-logo" src="./assets/jbs_jeonjin_team.png" alt="전진난만 팀 메인 이미지" />
          <a class="start-official-badge" href="https://www.instagram.com/jbsupporters_official/" target="_blank" rel="noopener noreferrer">
            <img src="./assets/jb_supporters_official.png" alt="전북은행 대학생 서포터즈 공식 로고" />
          </a>
        </div>

        <div class="info-card">
          <h2>테스트 안내</h2>
          <ul>
            <li>약 1분 소요</li>
            <li>익명으로 바로 진행</li>
            <li>결과 화면 저장/공유 가능</li>
          </ul>
        </div>

        <button id="start-btn" class="btn btn-primary">테스트 시작하기</button>
      </section>

      <section id="question-screen" class="screen" aria-live="polite">
        <header class="question-header">
          <button id="back-btn" class="btn btn-ghost" type="button">이전</button>
          <span id="progress-text">1 / 10</span>
        </header>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <h2 id="question-title" class="question-title"></h2>
        <div id="answers" class="answers"></div>
      </section>

      <section id="result-screen" class="screen" aria-live="polite">
        <p class="badge">결과</p>
        <div class="result-visual-wrap">
          <img id="result-visual" class="result-visual" src="./assets/result-c.svg" alt="결과 대표 이미지" />
        </div>
        <h2 id="result-title"></h2>
        <p id="result-desc" class="result-desc"></p>

        <div class="tips" id="result-tips"></div>

        <div class="brand-logos">
          <a href="https://www.instagram.com/jbsupporters_official/" target="_blank" rel="noopener noreferrer" class="brand-logo-link">
            <img src="./assets/jb_supporters_official.png" alt="전북은행 대학생 서포터즈 공식 로고" />
          </a>
          <a href="https://www.instagram.com/jbs_jeonjin.zip/" target="_blank" rel="noopener noreferrer" class="brand-logo-link">
            <img src="./assets/jbs_jeonjin_team.png" alt="전진난만 팀 로고" />
          </a>
        </div>

        <div class="result-actions">
          <button id="official-instagram-btn" class="btn btn-secondary" type="button">
            서포터즈 공식 인스타
          </button>
          <button id="team-instagram-btn" class="btn btn-secondary" type="button">
            전진난만 팀 인스타
          </button>
          <button id="story-share-btn" class="btn btn-secondary" type="button">
            인스타 스토리용 이미지 공유
          </button>
        </div>

        <button id="retry-btn" class="btn btn-primary">다시 테스트하기</button>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
