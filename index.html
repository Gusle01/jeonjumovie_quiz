<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>JIFF MoneyBTI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="start-screen" class="screen active start-screen">
        <p class="badge">전주국제영화제 스페셜</p>
        <h1>나의 영화제 소비 성향,<br /><span class="title-accent">MoneyBTI</span>로 확인하기</h1>
        <p class="subtitle">10개 질문으로 알아보는 나의 영화제 관람/소비 스타일</p>

        <div class="start-visual">
          <img class="start-team-logo" src="./assets/jbs_jeonjin_team.png" alt="전진난만 팀 메인 이미지" />
          <a class="start-official-badge" href="https://www.instagram.com/jbsupporters_official/" target="_blank" rel="noopener noreferrer">
            <img src="./assets/jb_supporters_official.png" alt="전북은행 대학생 서포터즈 공식 로고" />
          </a>
        </div>

        <div class="info-card">
          <h2>테스트 안내</h2>
          <ul>
            <li>약 1분 소요</li>
            <li>익명으로 바로 진행</li>
            <li>결과 화면 저장/공유 가능</li>
          </ul>
        </div>

        <button id="start-btn" class="btn btn-primary start-cta-fixed">테스트 시작하기</button>
      </section>

      <section id="question-screen" class="screen" aria-live="polite">
        <header class="question-header">
          <button id="back-btn" class="btn btn-ghost" type="button">‹ 이전</button>
          <span id="progress-text">1 / 10</span>
        </header>
        <div class="progress-track" aria-hidden="true">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <p id="question-label" class="question-label">Q1</p>
        <h2 id="question-title" class="question-title"></h2>
        <div id="answers" class="answers"></div>
      </section>

      <section id="result-screen" class="screen" aria-live="polite">
        <article class="result-card">
          <p class="badge">결과</p>
          <div class="result-visual-wrap">
            <div class="result-visual-inner">
              <img id="result-visual" class="result-visual" src="./assets/result-c.svg" alt="결과 대표 이미지" />
            </div>
          </div>
          <h2 id="result-title" class="result-title"></h2>
          <p id="result-desc" class="result-desc"></p>
          <div class="tips" id="result-tips"></div>
          <button id="benefit-btn" class="btn btn-primary benefit-entry-btn result-cta-fixed" type="button">
            나의 성향과 "<span class="sok-emphasis">쏙</span>"맞는 혜택 찾기
          </button>
        </article>

        <div class="brand-logos">
          <a href="https://www.instagram.com/jbsupporters_official/" target="_blank" rel="noopener noreferrer" class="brand-logo-link">
            <img
              src="./assets/jb_supporters_official.png"
              alt="전북은행 대학생 서포터즈 공식 로고"
              width="150"
              height="150"
            />
          </a>
          <a href="https://www.instagram.com/jbs_jeonjin.zip/" target="_blank" rel="noopener noreferrer" class="brand-logo-link">
            <img
              src="./assets/jbs_jeonjin_team_result.png"
              alt="전진난만 팀 로고"
              width="213"
              height="320"
            />
          </a>
        </div>

        <div class="result-actions">
          <button id="official-instagram-btn" class="btn btn-secondary icon-btn" type="button">
            <img src="./assets/icon-instagram.svg" alt="" aria-hidden="true" />
            <span>서포터즈 공식 인스타</span>
          </button>
          <button id="team-instagram-btn" class="btn btn-secondary icon-btn" type="button">
            <img src="./assets/icon-instagram.svg" alt="" aria-hidden="true" />
            <span>전진난만 팀 인스타</span>
          </button>
          <button id="story-share-btn" class="btn btn-secondary icon-btn" type="button">
            <img src="./assets/icon-share.svg" alt="" aria-hidden="true" />
            <span>결과 이미지 공유</span>
          </button>
          <button id="retry-btn" class="btn btn-secondary result-retry-inline" type="button">다시 테스트하기</button>
        </div>
      </section>

      <section id="benefit-screen" class="screen benefit-screen" aria-live="polite">
        <header class="benefit-header">
          <button id="benefit-back-btn" class="btn btn-ghost" type="button">‹ 결과로 돌아가기</button>
        </header>

        <p class="badge">쏙뱅크 추천</p>
        <div class="benefit-logo-wrap">
          <img src="./assets/sokbank-logo.png" alt="쏙뱅크 앱 로고" class="benefit-logo" width="440" height="390" />
        </div>
        <h2 id="benefit-title" class="benefit-title"></h2>
        <p id="benefit-subtitle" class="benefit-subtitle"></p>

        <div id="benefit-groups" class="benefit-groups"></div>
      </section>
    </main>

    <script src="./app.js?v=20260422e" defer></script>
  </body>
</html>
